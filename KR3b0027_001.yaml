body:
  text: 一一非罷非虎非狼得王侯公天為禹卜田于渭之陽呂尚坐漁文王勞而問子樂漁乎呂尚曰吾細人樂得其事今吾虞何胃虞佁呂尚曰夫漁有三權等以權以禁官夫漁求得其請深也根深請也君子親親生而事生之請也事之極也吾言不諱明小魚食之緡周魚食之侌緡重餌大魚食之魚牽於緡人食其祿而服於君故以餌取魚魚可殺也以祿取人人可渴以家遠聖人蜀知蜀聞蜀見樂才聖人大上歸其次斂文王曰斂何如而天下歸之呂尚曰下非一人之天下也天下之天下也國非一人國也仁之所在天下歸之義之所在天下歸之凡民者樂生而亞死亞危而歸利能生利文王再𦾙曰敢毋受天之詔命乎下大人之以人也才以以取國國以取天下二文王問大公望曰君國王民者其所以失之何大公望曰不慎所豫也君有三器六守臣有忠四曰信五奈何大公望曰富之觀其毋犯也貴觀其毋專也使之觀其毋㥯之觀其毋事之觀不剸者忠使之不㥯者信危之不者謀富勿使貴貴勿使富忠者毋遠君信者毋遠遠事君慎器作人作人則君將失其威三戎一其鄉則工一其鄉三有處民乃毋富於君都毋大是胃九交六守安君能長三葆定則君君無央九交親則君罷天之度臣有三勸信三勸乃親六懷皆得何人不服三勸不親游戎在身六無常游戎親六懷有常天下皆安和乃立王故大安尚正三文王問大公望曰守土奈何大公而人食之日中必衛人將來不終其世敬其衆則和殆是胃仁之紀方冬甚寒不能涷方夏甚暑不能最功賢民羣居國有大凶數奪之威息其明因順其常則𢛳逆則㧉之國家和服守土四文王問大公望曰守國奈何大公望曰資君天地之經四時之所生仁聖之道民機面再𦾙曰地經四時之所生仁聖之道民機之請大公望曰夫天生四時地萬才天下有民物生夏道長道實萬物盈冬大則復起反其所終始莫為天地和之至道然故仁聖之在天矣故因其恆常示之其所明動而為機機動而得失爭矣應和曰發之陰會之陽五文王才酆召大公望曰於乎謀念𢦛啻王猛極秋罪不我舍女嘗助豫務謀今我何如對曰王其修身下賢惠民以觀天道天道無央不可先昌人道無𢦛不可先謀必見其央有見其𢦛乃可以謀必見其外有見其內乃知其遂必見陽有見其陰乃知其心必見其人有見其親乃知其請行其道可至也從其可成也爭強者爭勝者也全勝可得全勝不斫大兵無創與鬼神通美才與民人同𢛳利相死同請相成同亞相助同好相趨毋甲兵而勝毋衝龍而功毋渠詹而守大知不知天下啓之害人者天下閉天下天下之天下天下如遂野鹿之毋取民者取民毋取國者取國毋取天下者取天下取民者民利之取者利之取天下者天下利之道在不可見可聞勝在不可知微才執鳥將執庳𪂏翕翼虎狼將耳固伏聖人將動必有愚色維文維𢛳孰為之戒弗觀亞知其極今皮殷商衆口相惑䛑䛑恬惔隨意好道無極是胃文亡國之聲也吾觀其野草茅勝穀吾觀其衆人羣曲笑直吾觀其君子衆賤枉直敗法亂刑上不知覺亡國之則也大上好化羣臣好得明發萬物皆發仁發萬物皆利兵發萬物皆服聖人之𢛳乎蜀聞蜀見樂才聖人六乎何愛何穡萬物皆得何穡何愛萬皆費正之所施化時之所在莫知其移聖人守此而何䆤之有之游之展槫而求之求而得之不可不暨已之不可不行也暨已行之地不自明故能弗復明故名聲章古者聚人為家聚家為國聚國為天下分而封賢以為萬名曰大別其正正教稍變法俗不同羣曲曲化變於刑容不通各樂其所民憂下止名之曰大定於乎聖人務靜之愚人務正之愚弗能正故與民爭生上勞刑蘩民憂尚流上下不世不休曰大失天下之人如流水章之則止啓之則行動之則濁靜之則之奈何大公望曰天有恆刑民有常生與天下同生而天下靜矣大上因之其次化之夫民化無以豫之而自富是胃順生以此角聖人之七文王問大公望曰余欲功三疑恐力不能養之使強哀盈使張離親以親散衆因衆凡謀之道周微為主摯以事啖以利餌爭心乃起其親乃止欲離其愛與其寵人豫之其所欲示之以利因以疏之毋使之以味虞以樂之以親必使遠民勿使知謀扶而入之后可試敬之才施惠以假衆衆以假賢假則有假假則有假以王天下三疑八得天下王曰吾地小而人寡吾何以得之大公望曰可之唯聖人取之曲直何人不九武王也名曰三機民之於利也之如冬日之民卯生明罰則民所從不知所去使民各得其生樂才其時稱賢使能而官有才則賢者歸之故賞於民生而罰於毋罪是以刑冬之必也思之如大暑之於也如大冬之於也風行天下迎之迎之而會會十文王業之而崩武王即立嚴殺僇毋常從之不義舍之不仁聞前行已修矣今時可臣固將言之周公旦之大公望曰夫受為無道忍百生君方明𢛳而誅之殺一夫而利天之匝以東伐受至於河上雨疾武王之乘黃振而死旗折正而后伐故功可得而立也意者我官治其氣偖王姑修身下賢須其時大公望曰四時無窮人時無恆與道無恆親盈變化天可孰為有天夫天先之之道先非之而后天下假之今夫受外失天下內失百生我方明𢛳而受之其不可何也夫以百生而攻天子可華而舍乎去必死進必取今日行之大公罪人而先涉以造於殷甲子之日至牧之野禽受𣪠其首於白三年而天下二𡸁歸之曰吾聞宿善者不且日不足之佝凡受之所佝刑殷民箕子行般庚之正使人人里其里田其田後嗣周有天下以為冢社沇才日不足葆啓十一如雷如庭振振冥冥天下十二曰以地取人胃之胃之備以祿取人胃之交以義取人胃之友友之友胃崩崩之崩胃之黨黨之黨胃之羣羣黨崩友皆十三力不能為奈何大公望曰蒼蒼上天莫知極柏王之君孰為法則往者不可及來者不可侍能明其世者胃之天子夫湯之伐桀也非其戰修也十四文王問大公望曰文王問大公望曰於乎文王問大公望曰黃帝文王問於文王曰鳥文王再𦾙民以仁義之言使廣不知道極之所旦文王再𦾙召大公望曰召大公望曰於乎今為之奈何大公望正奈何大公望大公望大公毋文王再𦾙再𦾙曰余聞在曰隹天隹人申申在人當瞿而立文王曰何涂之從大公望曰從上涂往而毋顧上涂不遠戒之毋反其往
